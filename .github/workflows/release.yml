name: Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

  docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service: [backend, user-frontend, admin-frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build applications
        run: bun run build

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.service }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.service }}:${{ github.sha }}

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build, docker]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Release
        id: semantic
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bun run release

      - name: Create release artifact
        if: steps.semantic.outputs.release_version
        run: echo "${{ steps.semantic.outputs.release_version }}" > release_version.txt

      - name: Upload release artifact
        if: steps.semantic.outputs.release_version
        uses: actions/upload-artifact@v4
        with:
          name: release-version
          path: release_version.txt

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: release
    if: success() && needs.release.outputs.release_version
    steps:
      - name: Download release artifact
        uses: actions/download-artifact@v4
        with:
          name: release-version

      - name: Deploy to server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /deployments/niftytools
            export RELEASE_VERSION=$(cat release_version.txt)
            sed -i "s/BACKEND_VERSION=.*/BACKEND_VERSION=$RELEASE_VERSION/" .env
            sed -i "s/USER_FRONTEND_VERSION=.*/USER_FRONTEND_VERSION=$RELEASE_VERSION/" .env
            sed -i "s/ADMIN_FRONTEND_VERSION=.*/ADMIN_FRONTEND_VERSION=$RELEASE_VERSION/" .env
            docker-compose up -d
            docker image prune -f
            docker container prune -f