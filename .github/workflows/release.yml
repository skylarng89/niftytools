name: Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
 release_and_deploy:
   name: Release and Deploy
   runs-on: ubuntu-latest
   if: github.event_name == 'push' && github.ref == 'refs/heads/main'
   permissions:
     contents: write
     packages: write
     issues: write
     pull-requests: write

   steps:
     - name: Checkout code
       uses: actions/checkout@v4
       with:
         fetch-depth: 0

     - name: Setup Bun
       uses: oven-sh/setup-bun@v2
       with:
         bun-version: latest

     - name: Install dependencies
       run: bun install

     - name: Build applications
       run: bun run build

     - name: Log in to Container Registry
       uses: docker/login-action@v3
       with:
         registry: ${{ env.REGISTRY }}
         username: ${{ github.actor }}
         password: ${{ secrets.GITHUB_TOKEN }}

     - name: Build and push Docker images
       run: |
         services=("backend" "user-frontend" "admin-frontend")
         for service in "${services[@]}"; do
           docker build -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${service}:latest -f ./apps/${service}/Dockerfile .
           docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${service}:latest
         done

     - name: Run Semantic Release
       id: semantic
       env:
         GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
       run: npx semantic-release

     - name: Deploy to server
       if: steps.semantic.outputs.new_release_published == 'true'
       uses: appleboy/ssh-action@v1.2.2
       with:
         host: ${{ secrets.SSH_HOST }}
         username: ${{ secrets.SSH_USERNAME }}
         key: ${{ secrets.SSH_KEY }}
         script: |
           cd /deployments/niftytools
           docker-compose up -d
           docker image prune -a -f
