name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  NODE_VERSION: '24'

jobs:
  # Separate job for testing and validation
  test:
    name: Test & Validate
    runs-on: ubuntu-latest
    outputs:
      should-deploy: ${{ steps.changes.outputs.deploy-needed }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint
        continue-on-error: false

      - name: Run type checking
        run: npm run type-check
        continue-on-error: false

      - name: Run tests
        run: npm run test
        continue-on-error: false

      - name: Build applications
        run: npm run build

      - name: Check for deployment changes
        id: changes
        run: |
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "deploy-needed=true" >> $GITHUB_OUTPUT
          else
            echo "deploy-needed=false" >> $GITHUB_OUTPUT
          fi

  # Build and push Docker images
  build:
    name: Build Images
    runs-on: ubuntu-latest
    needs: test
    if: needs.test.outputs.should-deploy == 'true'
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service: [backend, user-frontend, admin-frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  # Semantic release job
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    needs: [test, build]
    if: needs.test.outputs.should-deploy == 'true'
    permissions:
      contents: write
      packages: write
      issues: write
      pull-requests: write
    outputs:
      new-release-published: ${{ steps.semantic.outputs.new_release_published }}
      new-release-version: ${{ steps.semantic.outputs.new_release_version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install semantic-release
        run: npm install -g semantic-release @semantic-release/changelog @semantic-release/git

      - name: Run Semantic Release
        id: semantic
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: semantic-release

  # Deployment job
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build, release]
    if: needs.release.outputs.new-release-published == 'true'
    environment:
      name: production
      url: https://niftytools.app

    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          timeout: 300s
          command_timeout: 10m
          script: |
            set -e

            # Navigate to deployment directory
            cd /deployments/niftytools/prod

            # Pull latest images
            echo "Pulling latest images..."
            docker-compose pull

            # Start services
            echo "Starting services..."
            docker-compose up -d --remove-orphans

            # Clean up old images
            echo "Cleaning up old images..."
            docker image prune -a -f --filter "until=48h"

            echo "Deployment completed successfully!"

  # Notification job
  notify:
    name: Send Notifications
    runs-on: ubuntu-latest
    needs: [deploy, release]
    if: always() && needs.release.outputs.new-release-published == 'true'

    steps:
      - name: Set notification variables
        id: vars
        env:
          RELEASE_VERSION: ${{ needs.release.outputs.new-release-version }}
          DEPLOYMENT_STATUS: ${{ needs.deploy.result }}
        run: |
          if [ "$DEPLOYMENT_STATUS" == "success" ]; then
            echo "status-emoji=✅" >> $GITHUB_OUTPUT
            echo "status-text=succeeded" >> $GITHUB_OUTPUT
            echo "status-color=28a745" >> $GITHUB_OUTPUT
          else
            echo "status-emoji=❌" >> $GITHUB_OUTPUT
            echo "status-text=failed" >> $GITHUB_OUTPUT
            echo "status-color=dc3545" >> $GITHUB_OUTPUT
          fi
          echo "short-sha=${GITHUB_SHA:0:7}" >> $GITHUB_OUTPUT

      - name: GitHub Issue Notification
        if: env.CREATE_GITHUB_ISSUE == 'true'
        uses: actions/github-script@v7
        env:
          CREATE_GITHUB_ISSUE: ${{ secrets.CREATE_GITHUB_ISSUE || 'false' }}
        with:
          script: |
            const title = `${{ steps.vars.outputs.status-emoji }} Deployment ${{ steps.vars.outputs.status-text }} - v${{ needs.release.outputs.new-release-version }}`;
            const body = `
            ## Deployment Status: ${{ steps.vars.outputs.status-text }}

            ${{ steps.vars.outputs.status-emoji }} Deployment of version **${{ needs.release.outputs.new-release-version }}** has ${{ steps.vars.outputs.status-text }}.

            ### Details
            - **Repository:** ${{ github.repository }}
            - **Version:** ${{ needs.release.outputs.new-release-version }}
            - **Environment:** Production
            - **Commit:** [${{ steps.vars.outputs.short-sha }}](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})
            - **Workflow:** [${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

            ---
            *Automated notification from GitHub Actions*
            `;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['deployment', '${{ steps.vars.outputs.status-text }}']
            });

